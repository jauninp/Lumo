<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TodoTxt</title>
  <style>
/* variables.css */

:root {
  color-scheme: light;

  --bg: #f7f8f5;
  --panel: #ffffff;
  --panel-soft: #eef4ef;

  --ink: #1d2524;
  --muted: #64716d;
  --line: #d8dfdc;

  --accent: #197b75;
  --accent-strong: #11615d;
  --accent-soft: #d8eeeb;

  --danger: #b9363f;
  --warning: #b7791f;
  --ok: #2f7d49;

  --purple: #7554a8;
  --blue: #2f67b1;

  --radius: 8px;

  --shadow:
    0 18px 50px rgba(30, 41, 38, 0.11);

  font-family:
    Inter,
    ui-sans-serif,
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
}

/* base.css */

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,0.82),
      rgba(247,248,245,0.94)
    ),
    radial-gradient(
      circle at top left,
      rgba(25,123,117,0.13),
      transparent 34rem
    ),
    var(--bg);

  color: var(--ink);
  overflow-y: auto;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  border: 0;
  cursor: pointer;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0,0,0,0);
  border: 0;
}

/* layout.css */

.app {
  width: 100%;
  padding: 24px;
}

.topbar {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 16px;
  align-items: start;
  margin-bottom: 18px;
}

.brand h1 {
  margin: 0;
  font-size: clamp(1.8rem, 4vw, 3rem);
  line-height: 1;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 18px;
  align-items: start;
}

.workspace {
  min-width: 0;
}

.sidebar {
  display: grid;
  gap: 12px;
  align-content: start;
  position: sticky;
  top: 24px;
  align-self: start;
}

@media (max-width: 980px) {
  .topbar,
  .layout,
  .toolbar {
    grid-template-columns: 1fr;
  }

  .actions {
    justify-content: flex-start;
  }

  .sidebar {
    position: static;
  }
}

@media (max-width: 640px) {
  .app {
    padding: 16px;
  }
}

/* components.css */

/* Buttons */
.button {
  min-height: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 13px;
  border-radius: 7px;
  color: var(--ink);
  background: var(--panel);
  border: 1px solid var(--line);
  box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset;
  transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
}

.button:hover {
  transform: translateY(-1px);
  border-color: #b7c4bf;
}

.button.primary {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.button.primary:hover {
  background: var(--accent-strong);
}

.button.icon {
  width: 38px;
  padding: 0;
  font-size: 1.1rem;
}

.button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* Form Controls */
.text-input,
.select,
.textarea {
  width: 100%;
  min-height: 42px;
  padding: 10px 12px;
  border-radius: 7px;
  border: 1px solid var(--line);
  background: white;
  color: var(--ink);
  outline: none;
}

.select {
  min-height: 36px;
  padding: 6px 30px 6px 10px;
}

.text-input:focus,
.select:focus,
.textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

/* Panels */
.composer,
.quick-views,
.toolbar,
.todo-list,
.panel,
.kanban-column {
  background: rgba(255,255,255,0.86);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

.panel {
  padding: 14px;
}

.panel h2 {
  margin: 0 0 12px;
  font-size: 1rem;
}

/* Composer */
.composer {
  padding: 14px;
  margin-bottom: 12px;
}

.add-form {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: start;
}

.composer-suggest {
  position: relative;
  min-width: 0;
}

/* Suggestions */
.suggestions {
  position: absolute;
  z-index: 10;
  left: 0;
  right: 0;
  top: calc(100% + 4px);
  display: none;
  max-height: 220px;
  overflow: auto;
  padding: 4px;
  border-radius: 7px;
  border: 1px solid var(--line);
  background: white;
  box-shadow: var(--shadow);
}

.suggestions.visible {
  display: grid;
  gap: 2px;
}

.suggestion {
  min-height: 30px;
  padding: 5px 8px;
  border-radius: 5px;
  background: transparent;
  color: var(--ink);
  text-align: left;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  font-size: 0.9rem;
}

.suggestion:hover,
.suggestion.active {
  background: var(--accent-soft);
  color: var(--accent-strong);
}

/* Quick Views */
.quick-views {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 10px;
  margin-bottom: 12px;
}

.view-button {
  min-height: 34px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: white;
  white-space: nowrap;
}

.view-button.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.view-count {
  min-width: 22px;
  height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  background: var(--panel-soft);
  color: var(--accent-strong);
  font-size: 0.78rem;
  font-weight: 700;
}

.view-button.active .view-count {
  background: rgba(255,255,255,0.22);
  color: white;
}

/* Active Filters */
.active-filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: -4px 0 12px;
}

.filter-token {
  min-height: 30px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--accent);
  background: var(--accent-soft);
  color: var(--accent-strong);
}

.filter-token button {
  width: 20px;
  height: 20px;
  border-radius: 999px;
  background: rgba(255,255,255,0.72);
  color: inherit;
}

/* Toolbar */
.toolbar {
  padding: 10px;
  margin-bottom: 12px;
  display: grid;
  grid-template-columns: auto minmax(260px, 1fr) auto minmax(145px, 170px);
  gap: 8px;
  align-items: center;
}

.view-toggle {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.toggle {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
}

.toggle input {
  accent-color: var(--accent);
}

/* Todo List */
.todo-list {
  overflow: hidden;
}

.list-head,
.todo-row {
  display: grid;
  grid-template-columns: 38px 34px minmax(0, 1fr) auto;
  gap: 12px;
  align-items: center;
}

.list-head {
  position: sticky;
  top: 0;
  z-index: 2;
  padding: 13px 14px;
  background: #f4f7f5;
  border-bottom: 1px solid var(--line);
  color: var(--muted);
  font-size: 0.9rem;
}

.todo-row {
  padding: 1px 1px;
  border-bottom: 1px solid var(--line);
  background: rgba(255,255,255,0.7);
  transition: background 0.16s ease, box-shadow 0.16s ease;
}

.todo-row:last-child {
  border-bottom: 0;
}

.todo-row.done {
  background: #f0f2f1;
  color: var(--muted);
}

.todo-row.selected,
.kanban-card.selected {
  box-shadow: inset 3px 0 0 var(--accent);
}

.todo-row.dragging,
.kanban-card.dragging {
  opacity: 0.45;
}

.todo-row.drop-target {
  background: #eef8f6;
  box-shadow: inset 0 3px 0 var(--accent);
}

/* Todo Components */
.check {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  align-self: start;
  justify-self: center;
  margin-top: 10px;
}

.drag-handle {
  width: 30px;
  height: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: grab;
  font-size: 1.15rem;
  line-height: 1;
  transition: background 0.16s ease, border-color 0.16s ease, color 0.16s ease;
}

.drag-handle:hover {
  background: white;
  border-color: var(--line);
  color: var(--ink);
}

.drag-handle:active {
  cursor: grabbing;
}

.todo-main {
  min-width: 0;
}

.todo-render {
  width: 100%;
  min-height: 38px;
  padding: 7px 4px;
  border-radius: 6px;
  background: transparent;
  line-height: 1.45;
  font-size: 1.03rem;
  font-weight: 650;
  word-break: break-word;
}

.todo-row.done .todo-render,
.kanban-card.done .todo-render {
  text-decoration: line-through;
  color: var(--muted);
}

.inline-editor {
  width: 100%;
  min-height: 42px;
  padding: 7px 8px;
  border-radius: 6px;
  border: 1px solid var(--accent);
  background: white;
  box-shadow: 0 0 0 3px var(--accent-soft);
  resize: vertical;
  outline: none;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

/* Metadata and Chips */
.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 7px;
}

.chip,
.todo-token {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 0.78rem;
  white-space: nowrap;
}

.chip.priority,
.todo-token.priority {
  background: #f8e1e3;
  color: var(--danger);
}

.chip.project,
.todo-token.project {
  background: #eadff8;
  color: var(--purple);
}

.chip.context,
.todo-token.context {
  background: #dce9fb;
  color: var(--blue);
}

.chip.due.overdue {
  background: #f8e1e3;
  color: var(--danger);
}

.chip.due.today {
  background: #fff0cc;
  color: var(--warning);
}

.chip.due.future {
  background: #ddf0e4;
  color: var(--ok);
}

.chip.status-next {
  background: #ddf0e4;
  color: var(--ok);
}

.chip.status-waiting {
  background: #dce9fb;
  color: var(--blue);
}

.chip.status-blocked {
  background: #f8e1e3;
  color: var(--danger);
}

.todo-link {
  color: var(--accent-strong);
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* Row Actions */
.row-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  justify-content: flex-end;
}

.row-actions .button.icon {
  background: transparent;
  border-color: transparent;
  box-shadow: none;
}

.row-actions .button.icon:hover {
  background: var(--panel-soft);
}

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.stat {
  padding: 10px;
  border-radius: 7px;
  border: 1px solid var(--line);
  background: white;
}

.stat strong {
  display: block;
  font-size: 1.45rem;
}

.stat span {
  color: var(--muted);
  font-size: 0.78rem;
}

/* Facets */
.facet-list {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.facet {
  max-width: 100%;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: white;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.facet.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

/* Kanban */
.kanban-board {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 320px;
  align-items: start;
  gap: 18px;
  overflow-x: auto;
  overflow-y: visible;
  padding-bottom: 8px;
}

.kanban-column {
  min-height: 220px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.kanban-column.drop-target {
  background: #eef8f6;
  box-shadow: inset 0 0 0 3px var(--accent);
}

.kanban-column-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
  font-size: 1.1rem;
  font-weight: 700;
}

.kanban-cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 40px;
}

.kanban-card {
  position: relative;
  padding: 10px;
  border-radius: 7px;
  border: 1px solid var(--line);
  background: white;
  box-shadow: 0 1px 2px rgba(30,41,38,0.05);
  cursor: grab;
  transition: transform 0.16s ease, box-shadow 0.16s ease;
}

.kanban-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 2px 5px rgba(30,41,38,0.08);
}

.kanban-card:active {
  cursor: grabbing;
}

.kanban-card.done {
  background: #f0f2f1;
  color: var(--muted);
}

.kanban-card .todo-main {
  padding-left: 30px;
}

.kanban-card .check {
  position: absolute;
  top: 10px;
  left: 10px;
  margin-top: 0;
}

.kanban-card .row-actions {
  position: absolute;
  top: 8px;
  right: 8px;
  gap: 4px;
}

.kanban-card .meta {
  margin-top: 0;
  margin-right: 40px;
}

/* Modals */
.modal {
  width: min(760px, calc(100vw - 28px));
  border: 0;
  border-radius: var(--radius);
  padding: 0;
  box-shadow: 0 32px 80px rgba(0,0,0,0.26);
}

.modal::backdrop {
  background: rgba(18,25,23,0.52);
}

.modal-body {
  padding: 18px;
  background: var(--panel);
}

.textarea {
  min-height: 320px;
  resize: vertical;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  line-height: 1.5;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 12px;
}

.config-modal {
  width: min(980px, calc(100vw - 28px));
}

.config-modal-body {
  display: grid;
  gap: 12px;
}

.config-modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.config-modal-header h2 {
  margin: 0;
}

.config-modal-header p {
  margin: 4px 0 0;
  color: var(--muted);
}

.config-badge {
  flex: 0 0 auto;
  padding: 4px 9px;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent-strong);
  font-size: 0.78rem;
  font-weight: 800;
}

.config-line-preview {
  max-height: 86px;
  overflow: auto;
  padding: 10px 12px;
  border: 1px solid var(--line);
  border-radius: 7px;
  background: #f4f7f5;
  color: var(--muted);
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  font-size: 0.78rem;
  line-height: 1.45;
  white-space: pre-wrap;
  word-break: break-word;
}

.config-textarea {
  min-height: min(54vh, 520px);
  tab-size: 2;
}

.config-status {
  min-height: 30px;
  padding: 7px 10px;
  border-radius: 7px;
  border: 1px solid var(--line);
  font-size: 0.86rem;
}

.config-status.valid {
  background: #ddf0e4;
  border-color: #badcc7;
  color: var(--ok);
}

.config-status.invalid {
  background: #f8e1e3;
  border-color: #efb9bf;
  color: var(--danger);
}

/* Toast */
.toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  max-width: min(360px, calc(100vw - 36px));
  padding: 12px 14px;
  border-radius: 7px;
  background: #1d2524;
  color: white;
  box-shadow: var(--shadow);
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  display: flex;
  align-items: center;
  gap: 12px;
}

.toast.visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.toast-action {
  border: 0;
  border-radius: 6px;
  padding: 4px 8px;
  background: white;
  color: #1d2524;
  font-weight: 700;
  cursor: pointer;
}

/* Empty State */
.empty {
  padding: 44px 24px;
  text-align: center;
  color: var(--muted);
}

/* Groups */
.group {
  border-bottom: 1px solid var(--line);
}

.group-header {
  width: 100%;
  min-height: 42px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 14px;
  background: #f4f7f5;
  border: 0;
  border-top: 1px solid var(--line);
  color: var(--accent-strong);
  font-weight: 750;
  text-align: left;
}

.group-header span:last-child {
  color: var(--muted);
}

/* Project View */
.project-view-controls {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  align-items: center;
  gap: 12px;
  padding: 10px;
  background: rgba(255,255,255,0.86);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}

.project-view-legend {
  color: var(--muted);
  font-size: 0.82rem;
  white-space: nowrap;
}

.project-view-right,
.project-status-filters {
  display: flex;
  align-items: center;
  gap: 8px;
}

.project-status-filters {
  flex-wrap: wrap;
}

.project-status-filter {
  min-height: 30px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 4px 9px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: white;
  color: var(--muted);
  font-size: 0.82rem;
}

.project-status-filter strong {
  min-width: 20px;
  padding: 1px 6px;
  border-radius: 999px;
  background: var(--panel-soft);
  color: var(--ink);
  font-size: 0.75rem;
}

.project-status-filter.active {
  border-color: var(--accent);
  background: var(--accent-soft);
  color: var(--accent-strong);
}

.project-lanes {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 14px;
  align-items: start;
}

.project-lane {
  min-height: 180px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.72);
}

.project-lane.drop-target {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.project-lane-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.project-lane-header h2 {
  margin: 0;
  font-size: 0.95rem;
  color: var(--ink);
}

.project-lane-header span {
  min-width: 24px;
  padding: 2px 7px;
  border-radius: 999px;
  background: var(--panel-soft);
  color: var(--muted);
  font-size: 0.78rem;
  text-align: center;
}

.project-lane-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.project-lane .empty {
  padding: 18px 10px;
  font-size: 0.85rem;
}

.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
  gap: 10px;
}

.project-grid-compact {
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
}

.project-card {
  --project-color: var(--accent);
  position: relative;
  padding: 9px;
  border-radius: 8px;
  border: 1px solid var(--line);
  border-left: 5px solid var(--project-color);
  background: white;
  box-shadow: 0 2px 4px rgba(30,41,38,0.08);
  transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
}

.project-card:hover {

}

}

}

.project-card.undeclared {

  background: #f9f9f9;
}

.project-card.archived {

  background: #f5f5f5;
}

.project-card-header {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  margin-bottom: 6px;
}

.project-card-title {

}

.project-card-name {

.icon-button {

.field label {

.field input,
.field select,
.field textarea {

}

</head>

  <!-- Dialogs -->
  <dialog class="modal" id="textDialog">

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
(() => {
  "use strict";

  // config.js

  // Configuration et constantes de l'application
  const CONFIG = {
    STORAGE_KEY: "todotxtjs.single.v1",
    SETTINGS_KEY: "todotxtjs.single.settings.v1",
    SNAPSHOTS_KEY: "todotxtjs.single.snapshots.v1",
    MAX_SNAPSHOTS: 5,
  
    // Expressions régulières
    DATE_RE: /^(?:19|20)\d{2}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12]\d|3[01])$/,
    URL_RE: /^https?:\/\/[^\s]+$/i,
  
    // Configuration par défaut
    DEFAULT_CONFIG: {
      hiddenTags: ["created", "id", "completed"],
      groupBy: "",
      tagStyles: [
        { match: "^@", color: "#2f7d49" },
        { match: "^\\+", color: "#2f67b1" },
        { match: "^due:", color: "#b7791f" },
        { match: "^\\([A-Z]\\)$", color: "#b9363f" }
      ],
      priorities: ["A", "B", "C"],
      metadataSuggestions: {
        status: ["todo", "doing", "review", "done", "next", "waiting", "blocked"],
        due: ["today", "tomorrow"],
        start: ["today", "tomorrow"],
        wait: ["today", "tomorrow"]
      },
      savedViews: [
        { name: "Aujourd'hui", filter: "@today" },
        { name: "Relances", filter: "is:followup" },
        { name: "En retard", filter: "@overdue" },
        { name: "Cette semaine", filter: "is:week" },
        { name: "Next", filter: "status:next" },
        { name: "Waiting", filter: "status:waiting" },
        { name: "Blocked", filter: "status:blocked" },
        { name: "Sans projet", filter: "no:project" }
      ],
      views: {
        "kanban-status": {
          type: "kanban",
          groupBy: "status",
          columns: [
            { value: "todo", title: "Todo" },
            { value: "doing", title: "Doing" },
            { value: "review", title: "Review" },
            { value: "done", title: "Done" }
          ]
        }
      },
      projects: {
        "TodoTxtJs": {
          name: "Application TodoTxt",
          status: "active",
          description: "Évolution de l'outil todo.txt",
          color: "#197b75",
          priority: "A",
          archived: false
        }
      },
      smartRendering: { priority: {}, dates: true }
    },
  
    // Propriétés affichables
    PROPERTY_TOGGLES: [
      { key: "created", label: "Créée" },
      { key: "due", label: "Due" },
      { key: "project", label: "Projet" },
      { key: "context", label: "Contexte" },
      { key: "status", label: "Statut" },
      { key: "id", label: "Id" }
    ],
  
    // Exemple de données
    SAMPLE: [
      "(A) 2026-05-08 Reprendre +TodoTxtJs @dev due:2026-05-12 status:doing",
      "Préparer l'import du fichier todo.txt +TodoTxtJs @maison status:waiting wait:2026-05-10",
      "(B) Vérifier les points bloquants +TodoTxtJs @dev status:blocked",
      "x 2026-05-08 2026-05-01 Ancienne tâche terminée +Archive status:done",
      "Nouvelle idée pour le front-end +TodoTxtJs @dev status:todo"
    ].join("\n")
  };

  // Utilitaires de date
  const DateUtils = {
    todayISO() {
      return new Date().toISOString().slice(0, 10);
    },
  
    daysUntil(dateText) {
      const day = new Date(`${dateText}T00:00:00`);
      const today = new Date(`${this.todayISO()}T00:00:00`);
      return Math.ceil((day - today) / 86400000);
    },
  
    resolveDate(value) {
      if (value === "today") return this.todayISO();
      if (value === "tomorrow" || value === "yesterday") {
        const date = new Date(`${this.todayISO()}T00:00:00`);
        date.setDate(date.getDate() + (value === "tomorrow" ? 1 : -1));
        return date.toISOString().slice(0, 10);
      }
      return value;
    },
  
    formatSnapshotDate(value) {
      const date = new Date(value);
      return date.toLocaleString("fr-FR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    },
  
    timestampForFile() {
      const date = new Date();
      const pad = (value) => String(value).padStart(2, "0");
      return [
        date.getFullYear(),
        pad(date.getMonth() + 1),
        pad(date.getDate())
      ].join("-") + "-" + [pad(date.getHours()), pad(date.getMinutes()), pad(date.getSeconds())].join("");
    }
  };

  // Utilitaires généraux
  const Utils = {
    unique(values) {
      return [...new Set(values)].sort((a, b) => a.localeCompare(b));
    },
  
    escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    },
  
    deepMerge(base, extra) {
      const output = { ...base };
      for (const [key, value] of Object.entries(extra || {})) {
        if (value && typeof value === "object" && !Array.isArray(value) && base[key]) {
          output[key] = this.deepMerge(base[key], value);
        } else {
          output[key] = value;
        }
      }
      return output;
    },
  
    encodeNote(value) {
      return encodeURIComponent(value);
    },
  
    decodeNote(value) {
      try {
        return decodeURIComponent(value);
      } catch {
        return value;
      }
    },
  
    downloadFile(filename, text) {
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }
  };

  // state.js

  // État global de l'application
  const AppState = {
    // Configuration
    config: {},
  
    // Données
    todos: [],
    projects: [],
  
    // Interface utilisateur
    filter: "",
    filters: [],
    selectedId: "",
    editingId: "",
    viewMode: "list", // "list", "kanban" ou "projects"
    projectStatusFilter: "all",
  
    // Drag & Drop
    draggedId: "",
    draggedKanbanCardId: "",
    draggedKanbanCardInitialStatus: "",
    draggedProjectId: "",
  
    // États d'interface
    moveMode: false,
    deleteChord: false,
    collapsedGroups: new Set(),
    showNoStatusKanban: false,
    showArchivedProjects: false,
  
    // Suggestions
    newTodoSuggestions: [],
    suggestionIndex: 0,
  
    // Propriétés visibles
    visibleProps: {
      created: false,
      due: true,
      project: true,
      context: true,
      status: true,
      id: false,
      metadata: true,
      priority: true
    },
  
    // Paramètres d'affichage
    showDone: false,
    sort: "file",
  
    // Dialog
    dialogMode: "export",
  
    // Initialisation
    init() {
      this.config = this.readConfig();
      this.loadSettings();
      return this;
    },
  
    // Lecture de la configuration
    readConfig() {
      const source = document.querySelector("#app-config")?.textContent || "{}";
      try {
        return Utils.deepMerge(CONFIG.DEFAULT_CONFIG, JSON.parse(source));
      } catch (error) {
        console.warn("Configuration JSON invalide", error);
        return CONFIG.DEFAULT_CONFIG;
      }
    },
  
    // Chargement des paramètres
    loadSettings() {
      const settings = JSON.parse(localStorage.getItem(CONFIG.SETTINGS_KEY) || "{}");
      this.showDone = Boolean(settings.showDone);
      this.sort = settings.sort || "file";
      this.viewMode = settings.viewMode || "list";
      this.showNoStatusKanban = Boolean(settings.showNoStatusKanban);
      this.showArchivedProjects = Boolean(settings.showArchivedProjects);
      this.visibleProps = { ...this.visibleProps, ...(settings.visibleProps || {}) };
    },
  
    // Sauvegarde des paramètres
    saveSettings() {
      localStorage.setItem(CONFIG.SETTINGS_KEY, JSON.stringify({
        showDone: this.showDone,
        sort: this.sort,
        viewMode: this.viewMode,
        showNoStatusKanban: this.showNoStatusKanban,
        showArchivedProjects: this.showArchivedProjects,
        visibleProps: this.visibleProps
      }));
    },
  
    // Getters pour les vues configurées
    get quickViews() {
      return (this.config.savedViews || []).map(view => ({ 
        label: view.name, 
        filter: view.filter 
      }));
    },
  
    get kanbanView() {
      return Object.values(this.config.views || {}).find(view => view.type === "kanban") 
        || CONFIG.DEFAULT_CONFIG.views["kanban-status"];
    },
  
    get hiddenTags() {
      return new Set((this.config.hiddenTags || []).map(tag => tag.toLowerCase()));
    },
  
    get tagStyleRules() {
      return (this.config.tagStyles || []).map(rule => ({
        ...rule,
        regex: new RegExp(rule.match, "i")
      }));
    }
  };

  // parser.js

  // Parsing du format todo.txt étendu
  const TodoParser = {
  
    // Parse une ligne todo.txt en objet
    parseTodo(line, index) {
      const tokens = line.trim().split(/\s+/);
      let cursor = 0;
      let completed = false;
      let completedDate = "";
      let priority = "";
      let createdDate = "";

      // Statut de completion
      if (tokens[cursor] === "x") {
        completed = true;
        cursor += 1;
        if (CONFIG.DATE_RE.test(tokens[cursor] || "")) {
          completedDate = tokens[cursor];
          cursor += 1;
        }
      }

      // Priorité
      const priorityMatch = /^\(([A-Z])\)$/.exec(tokens[cursor] || "");
      if (priorityMatch) {
        priority = priorityMatch[1];
        cursor += 1;
      }

      // Date de création
      if (CONFIG.DATE_RE.test(tokens[cursor] || "")) {
        createdDate = tokens[cursor];
        cursor += 1;
      }

      // Contenu restant
      const content = tokens.slice(cursor).join(" ");
    
      // Extraction des métadonnées
      const projects = this.collect(content, /(?:^|\s)\+([^\s+@]+)/g);
      const contexts = this.collect(content, /(?:^|\s)@([^\s+@]+)/g);
      const metadata = this.collectPairs(content, /(?:^|\s)([A-Za-z][A-Za-z0-9_-]*):(?!\/\/)([^\s]+)/g);
    
      // Métadonnées spéciales
      const due = metadata.find(item => item.name.toLowerCase() === "due");
      const start = metadata.find(item => item.name.toLowerCase() === "start");
      const wait = metadata.find(item => item.name.toLowerCase() === "wait");
      const today = metadata.find(item => item.name.toLowerCase() === "today");
      const status = metadata.find(item => item.name.toLowerCase() === "status");
      const dependencies = metadata
        .filter(item => item.name.toLowerCase() === "after")
        .map(item => item.value);

      // Tags virtuels
      const virtualTags = this.generateVirtualTags(completed, due, wait, start, today);

      return {
        id: this.generateId(index),
        index,
        line,
        completed,
        completedDate,
        priority,
        createdDate,
        content,
        projects,
        contexts,
        metadata,
        dueDate: due && CONFIG.DATE_RE.test(due.value) ? due.value : "",
        startDate: start && CONFIG.DATE_RE.test(start.value) ? start.value : "",
        waitDate: wait && CONFIG.DATE_RE.test(wait.value) ? wait.value : "",
        todayDate: today && CONFIG.DATE_RE.test(today.value) ? today.value : "",
        status: status ? status.value.toLowerCase() : "",
        dependencies,
        virtualTags,
        blockedBy: []
      };
    },
  
    // Génère les tags virtuels
    generateVirtualTags(completed, due, wait, start, today) {
      const virtualTags = [];
      const todayISO = DateUtils.todayISO();
      const dueDays = due && CONFIG.DATE_RE.test(due.value) ? DateUtils.daysUntil(due.value) : null;
    
      if (!completed && (
        today?.value === todayISO || 
        due?.value === todayISO || 
        wait?.value === todayISO || 
        start?.value === todayISO
      )) {
        virtualTags.push("@today");
      }
    
      if (!completed && dueDays !== null && dueDays < 0) {
        virtualTags.push("@overdue");
      }
    
      if (!completed && !due) {
        virtualTags.push("@nodate");
      }
    
      return virtualTags;
    },
  
    // Génère un ID unique
    generateId(index) {
      return globalThis.crypto?.randomUUID 
        ? globalThis.crypto.randomUUID() 
        : `${Date.now()}-${index}-${Math.random()}`;
    },
  
    // Collecte les matches d'une regex
    collect(text, regex) {
      return Array.from(text.matchAll(regex), match => match[1]);
    },
  
    // Collecte les paires clé:valeur
    collectPairs(text, regex) {
      return Array.from(text.matchAll(regex), match => ({ 
        name: match[1], 
        value: match[2] 
      }));
    },
  
    // Parse le fichier complet avec config
    parseFile(text) {
      const lines = text.split(/\r?\n/);
      let config = {};
      let projects = [];
      const todos = [];
    
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
      
        if (!line) continue;
      
        // Ligne de configuration
        if (line.startsWith("#CONFIG ")) {
          try {
            const configText = line.slice(8);
            config = JSON.parse(configText);
          } catch (error) {
            console.warn("Erreur parsing config:", error);
          }
          continue;
        }
      
        // Ligne de projet
        if (line.startsWith("#PROJECT ")) {
          try {
            const projectText = line.slice(9);
            const project = JSON.parse(projectText);
            projects.push(project);
          } catch (error) {
            console.warn("Erreur parsing projet:", error);
          }
          continue;
        }
      
        // Ligne de tâche
        if (line.length > 0) {
          todos.push(this.parseTodo(line, todos.length));
        }
      }
    
      return { config, projects, todos };
    },
  
    // Enrichit une nouvelle ligne de tâche
    enrichNewTodoLine(line) {
      if (!line) return "";
      let next = this.ensureCreationDate(line);
      if (!this.hasMetadata(next, "id")) {
        next = `${next} id:${this.uniqueTaskId()}`;
      }
      return next;
    },
  
    // Assure qu'une date de création est présente
    ensureCreationDate(line) {
      const tokens = line.split(/\s+/);
      let cursor = 0;
    
      // Skip priority
      if (/^\([A-Z]\)$/.test(tokens[cursor] || "")) cursor = 1;
    
      // Already has creation date
      if (CONFIG.DATE_RE.test(tokens[cursor] || "")) return line;

      // Check for created: metadata
      const createdMeta = /(?:^|\s)created:((?:19|20)\d{2}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12]\d|3[01]))(?:\s|$)/i.exec(line);
      const createdDate = createdMeta ? createdMeta[1] : DateUtils.todayISO();
      const cleanLine = createdMeta ? line.replace(createdMeta[0], " ").replace(/\s+/g, " ").trim() : line;
      const cleanTokens = cleanLine.split(/\s+/);
    
      if (/^\([A-Z]\)$/.test(cleanTokens[0] || "")) {
        return [cleanTokens[0], createdDate, ...cleanTokens.slice(1)].join(" ");
      }
    
      return `${createdDate} ${cleanLine}`;
    },
  
    // Vérifie si une métadonnée existe
    hasMetadata(line, key) {
      return new RegExp(`(^|\\s)${Utils.escapeRegExp(key)}:(?!//)[^\\s]+`, "i").test(line);
    },
  
    // Génère un ID de tâche unique
    uniqueTaskId() {
      const existing = new Set(AppState.todos.map(todo => this.tagValue(todo, "id")).filter(Boolean));
      let id = "";
      do {
        id = `task${Date.now().toString(36)}${Math.random().toString(36).slice(2, 6)}`;
      } while (existing.has(id));
      return id;
    },
  
    // Récupère la valeur d'un tag
    tagValue(todo, key) {
      const normalized = key.toLowerCase();
      if (normalized === "status") return todo.status;
      if (normalized === "due") return todo.dueDate;
      if (normalized === "start") return todo.startDate;
      if (normalized === "wait") return todo.waitDate;
      if (normalized === "today") return todo.todayDate;
      const found = todo.metadata.find(item => item.name.toLowerCase() === normalized);
      return found ? found.value.toLowerCase() : "";
    }
  };

  // serializer.js

  // Sérialisation vers le format todo.txt
  const TodoSerializer = {
  
    // Sérialise une tâche en ligne todo.txt
    renderTodo(todo) {
      const parts = [];
    
      if (todo.completed) {
        parts.push("x");
        if (todo.completedDate) parts.push(todo.completedDate);
      }
    
      if (todo.priority) parts.push(`(${todo.priority})`);
      if (todo.createdDate) parts.push(todo.createdDate);
      if (todo.content) parts.push(todo.content);
    
      return parts.join(" ").trim();
    },
  
    // Exporte tout le fichier
    exportFile() {
      const lines = [];
    
      // Configuration
      if (Object.keys(AppState.config).length > 0) {
        lines.push(`#CONFIG ${JSON.stringify(AppState.config)}`);
      }
    
      // Projets
      for (const project of AppState.projects) {
        lines.push(`#PROJECT ${JSON.stringify(project)}`);
      }
    
      // Ligne vide si on a des métadonnées
      if (lines.length > 0) {
        lines.push("");
      }
    
      // Tâches triées par index
      const sortedTodos = [...AppState.todos].sort((a, b) => a.index - b.index);
      for (const todo of sortedTodos) {
        lines.push(todo.line);
      }
    
      return lines.join("\n");
    },
  
    // Met à jour ou ajoute une métadonnée dans le contenu
    upsertMetadata(content, key, value) {
      const pattern = new RegExp(`(^|\\s)${Utils.escapeRegExp(key)}:[^\\s]+`, "i");
      const token = `${key}:${value}`;
    
      if (pattern.test(content)) {
        return content.replace(pattern, (match, prefix) => `${prefix}${token}`).trim();
      }
    
      return `${content} ${token}`.trim();
    },
  
    // Supprime une métadonnée du contenu
    removeMetadata(content, key) {
      const pattern = new RegExp(`(^|\\s)${Utils.escapeRegExp(key)}:[^\\s]+`, "ig");
      return content.replace(pattern, " ").replace(/\s+/g, " ").trim();
    },
  
    // Met à jour une tâche avec de nouvelles métadonnées
    updateTodoMetadata(todo, key, value) {
      const updatedContent = value 
        ? this.upsertMetadata(todo.content, key, value)
        : this.removeMetadata(todo.content, key);
    
      const updatedLine = this.renderTodo({ ...todo, content: updatedContent });
    
      return TodoParser.parseTodo(updatedLine, todo.index);
    }
  };

  // storage.js

  // Gestion du stockage local et des snapshots
  const Storage = {
  
    // Charge les données depuis localStorage
    load() {
      const text = localStorage.getItem(CONFIG.STORAGE_KEY) || CONFIG.SAMPLE;
      const parsed = TodoParser.parseFile(text);
    
      AppState.config = Utils.deepMerge(AppState.config, parsed.config);
      AppState.projects = parsed.projects;
      AppState.todos = parsed.todos;
    
      this.refreshDerivedState();
    },
  
    // Sauvegarde les données
    save() {
      const text = TodoSerializer.exportFile();
      localStorage.setItem(CONFIG.STORAGE_KEY, text);
      this.saveSnapshot(text);
      AppState.saveSettings();
    },
  
    // Met à jour les états dérivés (dépendances, etc.)
    refreshDerivedState() {
      const doneIds = new Set();
    
      // Collecte les IDs des tâches terminées
      for (const todo of AppState.todos) {
        const idMeta = todo.metadata.find(item => item.name.toLowerCase() === "id");
        if (todo.completed && idMeta) {
          doneIds.add(idMeta.value);
        }
      }
    
      // Met à jour les blocages
      for (const todo of AppState.todos) {
        todo.blockedBy = todo.dependencies.filter(id => !doneIds.has(id));
        if (todo.blockedBy.length && !todo.virtualTags.includes("@blocked")) {
          todo.virtualTags.push("@blocked");
        }
      }
    },
  
    // Charge les snapshots
    loadSnapshots() {
      try {
        const snapshots = JSON.parse(localStorage.getItem(CONFIG.SNAPSHOTS_KEY) || "[]");
        return Array.isArray(snapshots) ? snapshots : [];
      } catch {
        return [];
      }
    },
  
    // Sauvegarde un snapshot
    saveSnapshot(text) {
      if (!text.trim()) return;
    
      const snapshots = this.loadSnapshots();
      if (snapshots[0]?.text === text) return;
    
      snapshots.unshift({
        createdAt: new Date().toISOString(),
        count: text.split(/\r?\n/).filter(line => line.trim()).length,
        text
      });
    
      localStorage.setItem(CONFIG.SNAPSHOTS_KEY, JSON.stringify(snapshots.slice(0, CONFIG.MAX_SNAPSHOTS)));
    },
  
    // Importe du texte
    importText(text) {
      const parsed = TodoParser.parseFile(text);
    
      AppState.config = Utils.deepMerge(CONFIG.DEFAULT_CONFIG, parsed.config);
      AppState.projects = parsed.projects;
      AppState.todos = parsed.todos;
    
      this.refreshDerivedState();
      this.save();
    },
  
    // Restaure un snapshot
    restoreSnapshot(snapshot) {
      this.importText(snapshot.text);
    }
  };

  // todos.js

  // Logique métier des tâches
  const TodoManager = {
  
    // Ajoute une nouvelle tâche
    addTodo(source) {
      const line = TodoParser.enrichNewTodoLine(source.trim());
      if (!line) return null;
    
      const todo = TodoParser.parseTodo(line, this.nextIndex());
      AppState.todos.push(todo);
      Storage.refreshDerivedState();
      Storage.save();
    
      return todo;
    },
  
    // Met à jour une tâche
    updateTodo(id, line) {
      const index = AppState.todos.findIndex(todo => todo.id === id);
      if (index < 0) return false;
    
      const trimmed = line.trim();
      if (!trimmed) {
        this.removeTodo(id);
        return true;
      }
    
      AppState.todos[index] = { 
        ...TodoParser.parseTodo(trimmed, AppState.todos[index].index), 
        id 
      };
    
      Storage.refreshDerivedState();
      Storage.save();
      return true;
    },
  
    // Supprime une tâche
    removeTodo(id) {
      AppState.todos = AppState.todos.filter(todo => todo.id !== id);
    
      if (AppState.selectedId === id) AppState.selectedId = "";
      if (AppState.editingId === id) AppState.editingId = "";
    
      Storage.refreshDerivedState();
      Storage.save();
      return true;
    },
  
    // Bascule le statut terminé/ouvert
    toggleTodo(id, completed) {
      const todo = AppState.todos.find(item => item.id === id);
      if (!todo) return false;
    
      todo.completed = completed;
      todo.completedDate = completed ? DateUtils.todayISO() : "";
      todo.line = TodoSerializer.renderTodo(todo);
    
      Object.assign(todo, TodoParser.parseTodo(todo.line, todo.index), { id: todo.id });
    
      Storage.refreshDerivedState();
      Storage.save();
      return true;
    },
  
    // Met à jour une métadonnée
    setTodoMetadata(id, key, value) {
      const index = AppState.todos.findIndex(todo => todo.id === id);
      if (index < 0) return false;
    
      const todo = AppState.todos[index];
      if (TodoParser.tagValue(todo, key) === value) return false;
    
      const updated = TodoSerializer.updateTodoMetadata(todo, key, value);
      updated.id = id;
      AppState.todos[index] = updated;
    
      Storage.refreshDerivedState();
      Storage.save();
      return true;
    },
  
    // Supprime une métadonnée
    removeTodoMetadata(id, key) {
      return this.setTodoMetadata(id, key, null);
    },
  
    // Réordonne les tâches
    reorderTodos(draggedId, targetId) {
      if (!draggedId || !targetId || draggedId === targetId) return false;
    
      const ordered = [...AppState.todos].sort((a, b) => a.index - b.index);
      const from = ordered.findIndex(todo => todo.id === draggedId);
      const to = ordered.findIndex(todo => todo.id === targetId);
    
      if (from < 0 || to < 0) return false;
    
      const [moved] = ordered.splice(from, 1);
      ordered.splice(to, 0, moved);
    
      ordered.forEach((todo, index) => {
        todo.index = index;
      });
    
      AppState.todos = ordered;
      AppState.sort = "file";
      Storage.save();
      return true;
    },
  
    // Déplace une tâche vers une colonne Kanban
    moveTodoToKanbanColumn(id, value) {
      const index = AppState.todos.findIndex(todo => todo.id === id);
      if (index < 0) return false;
    
      const key = AppState.kanbanView.groupBy;
      const todo = AppState.todos[index];
    
      const updated = TodoSerializer.updateTodoMetadata(todo, key, value);
      updated.id = id;
    
      // Réordonne pour grouper par statut
      const ordered = [...AppState.todos].sort((a, b) => a.index - b.index);
      const from = ordered.findIndex(item => item.id === id);
      ordered.splice(from, 1);
    
      const insertAfter = ordered.reduce((last, item, itemIndex) => 
        TodoParser.tagValue(item, key) === value ? itemIndex : last, -1);
    
      ordered.splice(insertAfter + 1, 0, updated);
    
      ordered.forEach((item, itemIndex) => {
        item.index = itemIndex;
      });
    
      AppState.todos = ordered;
      AppState.sort = "file";
      Storage.refreshDerivedState();
      Storage.save();
      return true;
    },
  
    // Calcule le prochain index
    nextIndex() {
      return AppState.todos.reduce((max, todo) => Math.max(max, todo.index), -1) + 1;
    },
  
    // Sélectionne une tâche
    selectTodo(id) {
      if (AppState.selectedId === id) return;
      AppState.selectedId = id;
    },
  
    // Démarre l'édition inline
    startInlineEdit(id) {
      AppState.selectedId = id;
      AppState.editingId = id;
    }
  };

  // projects.js

  // Logique métier des projets - Utilitaires
  const ProjectUtils = {
  
    // Génère un ID de projet unique
    generateProjectId() {
      const existing = new Set(AppState.projects.map(p => p.id));
      let id = "";
      do {
        id = `proj${Date.now().toString(36)}${Math.random().toString(36).slice(2, 4)}`;
      } while (existing.has(id));
      return id;
    }
  };

  // project-manager.js

  // Gestionnaire des projets
  const ProjectManager = {
  
    // Récupère tous les projets définis
    getAllProjects() {
      return AppState.config.projects || {};
    },
  
    // Récupère un projet par ID
    getProject(id) {
      return this.getAllProjects()[id] || null;
    },
  
    // Récupère les projets avec leurs statistiques
    getProjectsWithStats() {
      const projects = this.getAllProjects();
      const stats = new Map();
    
      // Initialise les stats pour tous les projets déclarés
      for (const [id, project] of Object.entries(projects)) {
        stats.set(id, {
          id,
          ...project,
          totalTodos: 0,
          openTodos: 0,
          doneTodos: 0,
          overdueTodos: 0,
          lastActivity: null
        });
      }
    
      // Calcule les stats depuis les tâches
      for (const todo of AppState.todos) {
        for (const projectId of todo.projects) {
          if (!stats.has(projectId)) {
            // Projet non déclaré mais utilisé dans les tâches
            stats.set(projectId, {
              id: projectId,
              name: projectId,
              status: "active",
              archived: false,
              totalTodos: 0,
              openTodos: 0,
              doneTodos: 0,
              overdueTodos: 0,
              lastActivity: null,
              undeclared: true
            });
          }
        
          const projectStats = stats.get(projectId);
          projectStats.totalTodos++;
        
          // Dernière activité
          if (todo.createdDate && (!projectStats.lastActivity || todo.createdDate > projectStats.lastActivity)) {
            projectStats.lastActivity = todo.createdDate;
          }
        
          if (todo.completed) {
            projectStats.doneTodos++;
            if (todo.completedDate && (!projectStats.lastActivity || todo.completedDate > projectStats.lastActivity)) {
              projectStats.lastActivity = todo.completedDate;
            }
          } else {
            projectStats.openTodos++;
            if (todo.dueDate && DateUtils.daysUntil(todo.dueDate) < 0) {
              projectStats.overdueTodos++;
            }
          }
        }
      }
    
      return Array.from(stats.values());
    },
  
    // Récupère les projets actifs
    getActiveProjects() {
      return this.getProjectsWithStats().filter(p => !p.archived && p.status !== "done");
    },
  
    // Récupère les tâches d'un projet
    getProjectTodos(projectId) {
      return AppState.todos.filter(todo => todo.projects.includes(projectId));
    },
  
    // Ajoute ou met à jour un projet
    setProject(id, project) {
      if (!AppState.config.projects) {
        AppState.config.projects = {};
      }
    
      const current = AppState.config.projects[id] || {};
      AppState.config.projects[id] = {
        ...current,
        name: project.name || id,
        status: project.status || "active",
        priority: project.priority || "",
        category: project.category || "",
        description: project.description || "",
        color: this.normalizeColor(project.color || current.color || "#197b75"),
        archived: Boolean(project.archived)
      };
    
      Storage.save();
      return true;
    },

    // Réécrit les projets dans un ordre précis, conservé dans la première ligne #CONFIG
    reorderProjects(orderedIds) {
      if (!AppState.config.projects) return false;
    
      const current = AppState.config.projects;
      const next = {};
      for (const id of orderedIds) {
        if (current[id]) next[id] = current[id];
      }
      for (const [id, project] of Object.entries(current)) {
        if (!next[id]) next[id] = project;
      }
    
      AppState.config.projects = next;
      Storage.save();
      return true;
    },

    normalizeColor(value) {
      const color = String(value || "").trim();
      return /^#[0-9a-f]{6}$/i.test(color) ? color : "#197b75";
    },
  
    // Supprime un projet
    removeProject(id) {
      if (!AppState.config.projects || !AppState.config.projects[id]) {
        return false;
      }
    
      delete AppState.config.projects[id];
      Storage.save();
      return true;
    },
  
    // Archive/désarchive un projet
    toggleArchive(id) {
      const project = this.getProject(id);
      if (!project) return false;
    
      return this.setProject(id, { ...project, archived: !project.archived });
    },
  
    // Change le statut d'un projet
    setStatus(id, status) {
      const project = this.getProject(id);
      if (!project) return false;
    
      return this.setProject(id, { ...project, status });
    },
  
    // Récupère les catégories utilisées
    getCategories() {
      const projects = this.getAllProjects();
      return Utils.unique(Object.values(projects)
        .map(p => p.category)
        .filter(Boolean));
    },
  
    // Récupère les statuts utilisés
    getStatuses() {
      return ["active", "waiting", "future", "blocked", "done"];
    }
  };

  // filters.js

  // Système de filtrage et vues
  const FilterManager = {
  
    // Filtre les tâches visibles
    getVisibleTodos() {
      const filter = [AppState.filter, ...AppState.filters].filter(Boolean).join(" ").toLowerCase();
    
      return [...AppState.todos]
        .filter(todo => AppState.showDone || !todo.completed)
        .filter(todo => this.matchesFilter(todo, filter))
        .sort(this.getSorter());
    },
  
    // Vérifie si une tâche correspond aux filtres
    matchesFilter(todo, filter) {
      if (!filter) return true;
    
      return filter
        .split(/\s+or\s+/i)
        .some(group => group
          .replace(/\s+and\s+/gi, " ")
          .split(/\s+/)
          .every(part => this.matchesFilterPart(todo, part)));
    },
  
    // Vérifie une partie de filtre
    matchesFilterPart(todo, part) {
      if (!part) return true;
      if (part.toUpperCase() === "AND") return true;
    
      // Négation
      if (part.startsWith("!")) {
        return !this.matchesFilterPart(todo, part.slice(1));
      }
    
      // Comparaisons de dates
      const compare = /^(due|start|wait|today)([<>=])(.+)$/.exec(part);
      if (compare) {
        return this.compareDate(
          TodoParser.tagValue(todo, compare[1]), 
          compare[2], 
          DateUtils.resolveDate(compare[3])
        );
      }
    
      // Priorité
      if (/^\([a-z]\)$/.test(part)) {
        return todo.priority.toLowerCase() === part.slice(1, 2);
      }
    
      // Tags virtuels
      if (part.startsWith("@") && todo.virtualTags.includes(part)) {
        return true;
      }
    
      // Filtres intelligents
      if (part.startsWith("is:")) {
        return this.matchesSmartFilter(todo, part.slice(3));
      }
    
      // Présence de champ
      if (part.startsWith("has:")) {
        return this.hasField(todo, part.slice(4));
      }
    
      // Absence de champ
      if (part.startsWith("no:")) {
        return !this.hasField(todo, part.slice(3));
      }
    
      // Raccourcis de dates
      if (part === "due:today") {
        return todo.dueDate === DateUtils.todayISO();
      }
    
      if (part === "due:soon") {
        return todo.dueDate && DateUtils.daysUntil(todo.dueDate) <= 7;
      }
    
      // Métadonnées clé:valeur
      if (/^[a-z][a-z0-9_-]*:/i.test(part)) {
        const [name, ...valueParts] = part.split(":");
        const value = valueParts.join(":").toLowerCase();
      
        if (["due", "start", "wait", "today"].includes(name)) {
          return TodoParser.tagValue(todo, name) === DateUtils.resolveDate(value);
        }
      
        return TodoParser.tagValue(todo, name) === value;
      }
    
      // Recherche textuelle
      return this.searchHaystack(todo).includes(part);
    },
  
    // Compare deux dates
    compareDate(left, operator, right) {
      if (!left || !CONFIG.DATE_RE.test(left) || !CONFIG.DATE_RE.test(right)) {
        return false;
      }
    
      if (operator === "<") return left < right;
      if (operator === ">") return left > right;
      return left === right;
    },
  
    // Construit la chaîne de recherche
    searchHaystack(todo) {
      return [
        todo.line, 
        ...todo.virtualTags, 
        todo.blockedBy.map(id => `after:${id}`).join(" ")
      ].join(" ").toLowerCase();
    },
  
    // Filtres intelligents
    matchesSmartFilter(todo, name) {
      const dueDays = todo.dueDate ? DateUtils.daysUntil(todo.dueDate) : null;
      const waitDays = todo.waitDate ? DateUtils.daysUntil(todo.waitDate) : null;
      const startDays = todo.startDate ? DateUtils.daysUntil(todo.startDate) : null;
    
      switch (name) {
        case "open":
          return !todo.completed;
        case "done":
          return todo.completed;
        case "today":
          return todo.todayDate === DateUtils.todayISO() || 
                 todo.dueDate === DateUtils.todayISO() || 
                 todo.waitDate === DateUtils.todayISO() || 
                 todo.startDate === DateUtils.todayISO();
        case "followup":
          return !todo.completed && todo.waitDate && waitDays <= 0;
        case "overdue":
          return !todo.completed && dueDays !== null && dueDays < 0;
        case "week":
          return !todo.completed && dueDays !== null && dueDays >= 0 && dueDays <= 7;
        case "soon":
          return !todo.completed && dueDays !== null && dueDays >= 0 && dueDays <= 3;
        case "waiting":
          return todo.status === "waiting" || (waitDays !== null && waitDays > 0);
        case "blocked":
          return todo.status === "blocked" || todo.blockedBy.length > 0;
        case "nodate":
          return todo.virtualTags.includes("@nodate");
        case "next":
          return todo.status === "next";
        case "available":
          return !todo.completed && 
                 (startDays === null || startDays <= 0) && 
                 (waitDays === null || waitDays <= 0);
        case "todo":
          return !todo.completed && todo.status === "todo";
        case "doing":
          return !todo.completed && todo.status === "doing";
        case "kanban-done":
          return todo.completed && todo.status === "done";
        default:
          return false;
      }
    },
  
    // Vérifie la présence d'un champ
    hasField(todo, field) {
      if (field === "project") return todo.projects.length > 0;
      if (field === "context") return todo.contexts.length > 0;
      if (field === "priority") return Boolean(todo.priority);
      if (field === "due") return Boolean(todo.dueDate);
      if (field === "start") return Boolean(todo.startDate);
      if (field === "wait") return Boolean(todo.waitDate);
      if (field === "today") return Boolean(todo.todayDate);
      if (field === "status") return Boolean(todo.status);
    
      return todo.metadata.some(item => item.name.toLowerCase() === field);
    },
  
    // Récupère la fonction de tri
    getSorter() {
      return (a, b) => {
        if (a.completed !== b.completed) return a.completed ? 1 : -1;
      
        if (AppState.sort === "priority") {
          return this.comparePriority(a, b) || this.compareDue(a, b) || a.index - b.index;
        }
      
        if (AppState.sort === "due") {
          return this.compareDue(a, b) || this.comparePriority(a, b) || a.index - b.index;
        }
      
        return a.index - b.index;
      };
    },
  
    // Compare les priorités
    comparePriority(a, b) {
      const left = a.priority ? a.priority.charCodeAt(0) : 999;
      const right = b.priority ? b.priority.charCodeAt(0) : 999;
      return left - right;
    },
  
    // Compare les échéances
    compareDue(a, b) {
      return this.compareTextDate(a.dueDate, b.dueDate);
    },
  
    // Compare deux dates textuelles
    compareTextDate(a, b) {
      if (!a && !b) return 0;
      if (!a) return 1;
      if (!b) return -1;
      return a.localeCompare(b);
    },
  
    // Compte les tâches pour un filtre
    countForFilter(filter) {
      return AppState.todos.filter(todo => 
        !todo.completed && this.matchesFilter(todo, filter.toLowerCase())
      ).length;
    },
  
    // Vérifie si un filtre est actif
    isFilterActive(value) {
      return AppState.filters.includes(value);
    },
  
    // Bascule un filtre
    toggleFilter(value) {
      if (!value) return;
    
      if (this.isFilterActive(value)) {
        AppState.filters = AppState.filters.filter(filter => filter !== value);
      } else {
        AppState.filters = [...AppState.filters, value];
      }
    },
  
    // Efface tous les filtres
    clearFilters() {
      AppState.filter = "";
      AppState.filters = [];
    }
  };

  // Composants UI réutilisables
  const UIComponents = {
  
    // Crée un bouton d'action
    createActionButton(text, label, handler, className = "") {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `button icon ${className}`.trim();
      button.textContent = text;
      button.title = label;
      button.setAttribute("aria-label", label);
      button.addEventListener("click", handler);
      return button;
    },
  
    // Crée un chip/badge
    createChip(text, kind, filterValue = null) {
      const node = document.createElement(filterValue ? "button" : "span");
      node.className = `chip ${kind}`.trim();
      node.textContent = text;
    
      if (filterValue) {
        node.type = "button";
        node.title = "Filtrer";
        node.addEventListener("click", () => {
          if (AppState.filters.includes(filterValue)) {
            AppState.filters = AppState.filters.filter(filter => filter !== filterValue);
          } else {
            AppState.filters = [...AppState.filters, filterValue];
          }
          UIRenderer.render();
        });
      }
    
      return node;
    },
  
    // Crée un token todo cliquable
    createTodoToken(token) {
      const node = document.createElement("button");
      node.type = "button";
      node.className = `todo-token ${this.getInlineTokenClass(token)}`;
    
      const priorityMatch = /^\(([A-Z])\)$/.exec(token);
      node.textContent = priorityMatch ? 
        (AppState.config.smartRendering?.priority?.[priorityMatch[1]] || token) : 
        token;
    
      const style = AppState.tagStyleRules.find(rule => rule.regex.test(token));
      if (style?.color) node.style.color = style.color;
    
      if (token.startsWith("+")) {
        const project = ProjectManager.getProject(token.slice(1));
        const color = project?.color ? ProjectManager.normalizeColor(project.color) : "";
        if (color) {
          node.style.color = color;
          node.style.backgroundColor = `${color}1f`;
        }
      }
    
      node.addEventListener("click", (event) => {
        event.stopPropagation();
        if (AppState.filters.includes(token)) {
          AppState.filters = AppState.filters.filter(filter => filter !== token);
        } else {
          AppState.filters = [...AppState.filters, token];
        }
        UIRenderer.render();
      });
    
      return node;
    },
  
    // Détermine la classe CSS d'un token
    getInlineTokenClass(token) {
      if (/^\([A-Z]\)$/.test(token)) return "priority";
      if (token.startsWith("+")) return "project";
      if (token.startsWith("@")) return "context";
      if (token.startsWith("due:")) return "due";
      return "metadata";
    },
  
    // Crée un bouton de vue rapide
    createViewButton(view) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `view-button${AppState.filters.includes(view.filter) ? " active" : ""}`;
    
      const label = document.createElement("span");
      label.textContent = view.label;
    
      const count = document.createElement("span");
      count.className = "view-count";
      count.textContent = AppState.todos.filter(todo => 
        !todo.completed && UIRenderer.matchesFilter(todo, view.filter.toLowerCase())
      ).length;
    
      button.append(label, count);
      button.addEventListener("click", () => {
        if (AppState.filters.includes(view.filter)) {
          AppState.filters = AppState.filters.filter(filter => filter !== view.filter);
        } else {
          AppState.filters = [...AppState.filters, view.filter];
        }
        UIRenderer.render();
      });
    
      return button;
    },
  
    // Crée un token de filtre actif
    createFilterToken(value) {
      const token = document.createElement("span");
      token.className = "filter-token";
      token.textContent = value;

      const remove = document.createElement("button");
      remove.type = "button";
      remove.textContent = "×";
      remove.setAttribute("aria-label", `Retirer ${value}`);
      remove.addEventListener("click", () => {
        AppState.filters = AppState.filters.filter(filter => filter !== value);
        UIRenderer.render();
      });

      token.append(remove);
      return token;
    },
  
    // Crée un facet cliquable
    createFacet(value) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `facet${AppState.filters.includes(value) ? " active" : ""}`;
      button.textContent = value;
    
      if (value.startsWith("+")) {
        const project = ProjectManager.getProject(value.slice(1));
        const color = project?.color ? ProjectManager.normalizeColor(project.color) : "";
        if (color) {
          button.style.borderColor = `${color}66`;
          button.style.color = color;
          button.style.backgroundColor = `${color}14`;
        }
      }
    
      button.addEventListener("click", () => {
        if (AppState.filters.includes(value)) {
          AppState.filters = AppState.filters.filter(filter => filter !== value);
        } else {
          AppState.filters = [...AppState.filters, value];
        }
        UIRenderer.render();
      });
      return button;
    },
  
    // Crée un message vide
    createEmptyMessage(text) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = text;
      return empty;
    },
  
    // Crée un toggle de propriété
    createPropertyToggle(item) {
      const label = document.createElement("label");
      label.className = "property-toggle";
    
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = Boolean(AppState.visibleProps[item.key]);
      checkbox.addEventListener("change", () => {
        AppState.visibleProps[item.key] = checkbox.checked;
        Storage.save();
        UIRenderer.render();
      });
    
      label.append(checkbox, document.createTextNode(item.label));
      return label;
    },
  
    // Crée une suggestion d'autocomplétion
    createSuggestion(value, index) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `suggestion${index === AppState.suggestionIndex ? " active" : ""}`;
      button.textContent = value;
      button.addEventListener("mousedown", (event) => {
        event.preventDefault();
        SuggestionManager.acceptSuggestion(index);
      });
      return button;
    },
  
    // Crée un éditeur inline
    createInlineEditor(todo) {
      const editor = document.createElement("textarea");
      editor.className = "inline-editor";
      editor.value = todo.line;
      editor.rows = Math.max(1, Math.ceil(todo.line.length / 70));
    
      editor.addEventListener("click", (event) => event.stopPropagation());
      editor.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          event.preventDefault();
          event.stopPropagation();
          AppState.editingId = "";
          UIRenderer.render();
        }
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          event.stopPropagation();
          AppState.editingId = "";
        
          const index = AppState.todos.findIndex(t => t.id === todo.id);
          if (index >= 0) {
            const trimmed = editor.value.trim();
            if (!trimmed) {
              AppState.todos = AppState.todos.filter(t => t.id !== todo.id);
              if (AppState.selectedId === todo.id) AppState.selectedId = "";
              if (AppState.editingId === todo.id) AppState.editingId = "";
            } else {
              AppState.todos[index] = { 
                ...TodoParser.parseTodo(trimmed, AppState.todos[index].index), 
                id: todo.id
              };
            }
          
            Storage.refreshDerivedState();
            Storage.save();
          }
        
          UIRenderer.render();
        }
      });
    
      requestAnimationFrame(() => {
        editor.focus();
        editor.setSelectionRange(editor.value.length, editor.value.length);
      });
    
      return editor;
    }
  };

  // Rendu des vues de l'interface utilisateur
  const UIRenderer = {
  
    // Éléments DOM
    elements: {},
  
    // Initialise les références DOM
    initElements() {
      this.elements = {
        addForm: document.querySelector("#addForm"),
        newTodo: document.querySelector("#newTodo"),
        newTodoSuggestions: document.querySelector("#newTodoSuggestions"),
        searchInput: document.querySelector("#searchInput"),
        showDone: document.querySelector("#showDone"),
        sortSelect: document.querySelector("#sortSelect"),
        propertyToggles: document.querySelector("#propertyToggles"),
        quickViews: document.querySelector("#quickViews"),
        activeFilters: document.querySelector("#activeFilters"),
        todoListSection: document.querySelector("#todoListSection"),
        todoList: document.querySelector("#todoList"),
        openCount: document.querySelector("#openCount"),
        doneCount: document.querySelector("#doneCount"),
        dueCount: document.querySelector("#dueCount"),
        priorityFacets: document.querySelector("#priorityFacets"),
        projectFacets: document.querySelector("#projectFacets"),
        contextFacets: document.querySelector("#contextFacets"),
        statusFacets: document.querySelector("#statusFacets"),

        toast: document.querySelector("#toast")
      };
    },
  
    // Rendu principal
    render() {
      this.syncControls();
      this.renderQuickViews();
      this.renderActiveFilters();
      this.renderStats();
      this.renderFacets();
    
      // Bascule entre les vues
      this.elements.todoListSection.style.display = AppState.viewMode === "list" ? "" : "none";
      this.elements.kanbanWrapper.style.display = AppState.viewMode === "kanban" ? "" : "none";
    
      const projectWrapper = document.querySelector("#projectWrapper");
      if (projectWrapper) {
        projectWrapper.style.display = AppState.viewMode === "projects" ? "" : "none";
      }
    
      if (AppState.viewMode === "list") {
        this.renderList();
      } else if (AppState.viewMode === "kanban") {
        this.renderKanban();
      } else if (AppState.viewMode === "projects") {
        this.renderProjects();
      }
    },
  
    // Synchronise les contrôles
    syncControls() {
      this.elements.searchInput.value = AppState.filter;
      this.elements.showDone.checked = AppState.showDone;
      this.elements.sortSelect.value = AppState.sort;
    
      // Boutons de vue
      this.elements.listViewButton.classList.toggle("active", AppState.viewMode === "list");
      this.elements.kanbanViewButton.classList.toggle("active", AppState.viewMode === "kanban");
    
      const projectViewButton = document.querySelector("#projectViewButton");
      if (projectViewButton) {
        projectViewButton.classList.toggle("active", AppState.viewMode === "projects");
      }
    
      this.renderPropertyToggles();
    },
  
    // Rendu des toggles de propriétés
    renderPropertyToggles() {
      this.elements.propertyToggles.replaceChildren();
      for (const item of CONFIG.PROPERTY_TOGGLES) {
        this.elements.propertyToggles.append(UIComponents.createPropertyToggle(item));
      }
    },
  
    // Rendu des vues rapides
    renderQuickViews() {
      this.elements.quickViews.replaceChildren();
      for (const view of AppState.quickViews) {
        this.elements.quickViews.append(UIComponents.createViewButton(view));
      }
    },
  
    // Rendu des filtres actifs
    renderActiveFilters() {
      this.elements.activeFilters.replaceChildren();
      for (const value of AppState.filters) {
        this.elements.activeFilters.append(UIComponents.createFilterToken(value));
      }
    },
  
    // Rendu des statistiques
    renderStats() {
      const open = AppState.todos.filter(todo => !todo.completed).length;
      const done = AppState.todos.length - open;
      const due = AppState.todos.filter(todo => 
        !todo.completed && todo.dueDate && DateUtils.daysUntil(todo.dueDate) <= 7
      ).length;
    
      this.elements.openCount.textContent = open;
      this.elements.doneCount.textContent = done;
      this.elements.dueCount.textContent = due;
    },
  
    // Rendu des facettes
    renderFacets() {
      const openTodos = AppState.todos.filter(todo => !todo.completed);
    
      this.renderFacetGroup(
        this.elements.priorityFacets, 
        Utils.unique(openTodos.map(todo => todo.priority).filter(Boolean)).map(name => `(${name})`)
      );
    
      this.renderFacetGroup(
        this.elements.projectFacets, 
        Utils.unique(openTodos.flatMap(todo => todo.projects)).map(name => `+${name}`)
      );
    
      this.renderFacetGroup(
        this.elements.contextFacets, 
        Utils.unique(openTodos.flatMap(todo => todo.contexts)).map(name => `@${name}`)
      );
    
      this.renderFacetGroup(
        this.elements.statusFacets, 
        Utils.unique(openTodos.map(todo => todo.status).filter(Boolean)
          .concat(["todo", "doing", "review", "done"])).map(name => `status:${name}`)
      );
    },
  
    // Rendu de la vue Projets
    renderProjects() {
      const projectBoard = document.querySelector("#projectBoard");
      const projectControls = document.querySelector("#projectControls");
    
      if (!projectBoard || !projectControls) return;
    
      projectBoard.replaceChildren();
      projectControls.replaceChildren();
    
      const controls = document.createElement("div");
      controls.className = "project-view-controls";

      const statusFilters = this.createProjectStatusFilters();
    
      const showArchived = document.createElement("label");
      showArchived.className = "toggle";
    
      const archivedCheckbox = document.createElement("input");
      archivedCheckbox.type = "checkbox";
      archivedCheckbox.checked = AppState.showArchivedProjects || false;
      archivedCheckbox.addEventListener("change", () => {
        AppState.showArchivedProjects = archivedCheckbox.checked;
        Storage.save();
        this.renderProjects();
      });
    
      showArchived.append(archivedCheckbox, document.createTextNode("Archivés"));
    
      const addButton = document.createElement("button");
      addButton.type = "button";
      addButton.className = "button primary";
      addButton.textContent = "Nouveau projet";
      addButton.addEventListener("click", () => {
        this.showProjectDialog();
      });
    
      const legend = document.createElement("div");
      legend.className = "project-view-legend";
      legend.textContent = "Glissez les cartes pour définir l'ordre du JSON.";
    
      const rightControls = document.createElement("div");
      rightControls.className = "project-view-right";
      rightControls.append(showArchived, addButton);
    
      controls.append(statusFilters, legend, rightControls);
      projectControls.append(controls);
    
      const declaredProjects = this.getDeclaredProjectsWithStats();
      const detectedProjects = this.getDetectedProjectsWithStats();
      const visibleProjects = AppState.projectStatusFilter === "all"
        ? declaredProjects
        : declaredProjects.filter(project => project.status === AppState.projectStatusFilter);
    
      if (visibleProjects.length > 0) {
        projectBoard.append(this.createProjectOverview(visibleProjects));
      } else if (declaredProjects.length > 0) {
        projectBoard.append(UIComponents.createEmptyMessage("Aucun projet dans ce statut."));
      }

      if (detectedProjects.length > 0) {
        const detectedSection = this.createProjectSection("Projets détectés (non déclarés)", detectedProjects, true);
        projectBoard.append(detectedSection);
      }
    
      if (declaredProjects.length === 0 && detectedProjects.length === 0) {
        projectBoard.append(UIComponents.createEmptyMessage("Aucun projet. Créez un nouveau projet ou utilisez +NomProjet dans vos tâches."));
      }
    },

    createProjectStatusFilters() {
      const counts = new Map([["all", 0]]);
      for (const status of this.getProjectStatusDefinitions()) {
        counts.set(status.value, 0);
      }
    
      for (const project of this.getDeclaredProjectsWithStats()) {
        counts.set("all", counts.get("all") + 1);
        counts.set(project.status, (counts.get(project.status) || 0) + 1);
      }
    
      const filterBar = document.createElement("div");
      filterBar.className = "project-status-filters";
    
      const filters = [
        { value: "all", label: "Tous" },
        ...this.getProjectStatusDefinitions()
      ];
    
      for (const filter of filters) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `project-status-filter${AppState.projectStatusFilter === filter.value ? " active" : ""}`;
      
        const label = document.createElement("span");
        label.textContent = filter.label;
      
        const count = document.createElement("strong");
        count.textContent = String(counts.get(filter.value) || 0);
      
        button.append(label, count);
        button.addEventListener("click", () => {
          AppState.projectStatusFilter = filter.value;
          this.renderProjects();
        });
      
        filterBar.append(button);
      }
    
      return filterBar;
    },
  
    // Récupère les projets déclarés avec statistiques
    getDeclaredProjectsWithStats() {
      const declaredProjects = ProjectManager.getAllProjects();
      const projects = [];
    
      for (const [id, project] of Object.entries(declaredProjects)) {
        if (AppState.showArchivedProjects || !project.archived) {
          const stats = this.calculateProjectStats(id);
          projects.push({
            id,
            ...project,
            ...stats,
            declared: true
          });
        }
      }
    
      return projects;
    },
  
    // Récupère les projets détectés (non déclarés) avec statistiques
    getDetectedProjectsWithStats() {
      const declaredIds = new Set(Object.keys(ProjectManager.getAllProjects()));
      const detectedIds = new Set();
    
      // Collecte tous les +tags utilisés dans les tâches
      for (const todo of AppState.todos) {
        for (const project of todo.projects) {
          if (!declaredIds.has(project)) {
            detectedIds.add(project);
          }
        }
      }
    
      const projects = [];
      for (const id of detectedIds) {
        const stats = this.calculateProjectStats(id);
        if (stats.totalTodos > 0) { // Seulement si il y a des tâches
          projects.push({
            id,
            name: id,
            status: "active",
            archived: false,
            declared: false,
            ...stats
          });
        }
      }
    
      return projects.sort((a, b) => b.openTodos - a.openTodos);
    },
  
    // Calcule les statistiques d'un projet
    calculateProjectStats(projectId) {
      const projectTodos = AppState.todos.filter(todo => todo.projects.includes(projectId));
      const openTodos = projectTodos.filter(todo => !todo.completed);
      const doneTodos = projectTodos.filter(todo => todo.completed);
      const overdueTodos = openTodos.filter(todo => 
        todo.dueDate && DateUtils.daysUntil(todo.dueDate) < 0
      );
    
      // Dernière activité (dernière tâche modifiée ou créée)
      let lastActivity = null;
      for (const todo of projectTodos) {
        const date = todo.completedDate || todo.createdDate;
        if (date && (!lastActivity || date > lastActivity)) {
          lastActivity = date;
        }
      }
    
      return {
        totalTodos: projectTodos.length,
        openTodos: openTodos.length,
        doneTodos: doneTodos.length,
        overdueTodos: overdueTodos.length,
        lastActivity
      };
    },
  
    // Crée une section de projets
    createProjectSection(title, projects, isDetected = false) {
      const section = document.createElement("section");
      section.className = "project-section";
    
      const header = document.createElement("h2");
      header.className = "project-section-title";
      header.textContent = title;
    
      const grid = document.createElement("div");
      grid.className = "project-grid";
    
      for (const project of projects) {
        grid.append(this.createProjectCard(project, isDetected));
      }
    
      section.append(header, grid);
      return section;
    },

    createProjectOverview(projects) {
      const section = document.createElement("section");
      section.className = "project-section project-overview";
    
      const grid = document.createElement("div");
      grid.className = "project-grid project-grid-compact";
    
      for (const project of projects) {
        grid.append(this.createProjectCard(project));
      }
    
      section.append(grid);
      return section;
    },

    // Crée une colonne de projets par statut
    createProjectLane(lane, projects) {
      const section = document.createElement("section");
      section.className = `project-lane project-lane-${lane.value}`;
      section.dataset.status = lane.value;
    
      const header = document.createElement("div");
      header.className = "project-lane-header";

          alert("Un projet avec cet ID existe déjà.");

        });
